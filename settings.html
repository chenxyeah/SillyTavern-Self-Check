<div id="stsc_manager_overlay" class="stsc-overlay stsc-hidden" aria-hidden="true">
  <div class="stsc-manager" role="dialog" aria-modal="true" aria-label="写作前置自检管理器">
    <div class="stsc-manager-header">
      <div class="stsc-manager-heading">
        <div class="stsc-manager-title">写作前置自检</div>
        <div id="stsc_manager_subtitle" class="stsc-manager-subtitle"></div>
      </div>
      <div class="stsc-header-actions">
        <span id="stsc_save_state" class="stsc-save-state">已保存</span>
        <button id="stsc_save_changes" class="menu_button stsc-save-button" type="button" disabled>保存更改</button>
        <button id="stsc_close_manager" class="menu_button stsc-icon-button" type="button" title="关闭" aria-label="关闭">✕</button>
      </div>
    </div>

    <div class="stsc-tabs" role="tablist" aria-label="写作前置自检功能页">
      <button class="stsc-tab active" type="button" data-tab="status">当前状态</button>
      <button class="stsc-tab" type="button" data-tab="presets">自检预设</button>
      <button class="stsc-tab" type="button" data-tab="references">参考资料库</button>
      <button class="stsc-tab" type="button" data-tab="temporary">临时指令</button>
      <button class="stsc-tab" type="button" data-tab="settings">插件设置</button>
    </div>

    <div class="stsc-manager-body">
      <section id="stsc_tab_status" class="stsc-tab-panel active"></section>
      <section id="stsc_tab_presets" class="stsc-tab-panel"></section>
      <section id="stsc_tab_references" class="stsc-tab-panel"></section>
      <section id="stsc_tab_temporary" class="stsc-tab-panel"></section>
      <section id="stsc_tab_settings" class="stsc-tab-panel"></section>
    </div>
  </div>
</div>

<div id="stsc_dialog_overlay" class="stsc-dialog-overlay stsc-hidden" aria-hidden="true">
  <div class="stsc-dialog" role="dialog" aria-modal="true" aria-label="写作前置自检操作窗口">
    <div class="stsc-dialog-header">
      <div id="stsc_dialog_title" class="stsc-dialog-title"></div>
      <button id="stsc_dialog_close" class="menu_button stsc-icon-button" type="button" title="关闭" aria-label="关闭">✕</button>
    </div>
    <div id="stsc_dialog_body" class="stsc-dialog-body"></div>
    <div id="stsc_dialog_footer" class="stsc-dialog-footer"></div>
  </div>
</div>

<div id="stsc_floating_root" class="stsc-floating-root stsc-hidden" aria-hidden="true">
  <button id="stsc_floating_button" class="stsc-floating-button" type="button" title="查看最新自检" aria-label="查看最新自检">
    <span class="stsc-floating-icon">✓</span>
    <span id="stsc_floating_badge" class="stsc-floating-badge stsc-hidden">!</span>
  </button>
  <div id="stsc_floating_panel" class="stsc-floating-panel stsc-hidden" role="dialog" aria-label="最新一轮自检">
    <div class="stsc-floating-header">
      <div>
        <div class="stsc-floating-title">最新一轮自检</div>
        <div id="stsc_floating_subtitle" class="stsc-muted"></div>
      </div>
      <button id="stsc_floating_close" class="menu_button stsc-icon-button" type="button" aria-label="关闭悬浮窗">✕</button>
    </div>
    <div id="stsc_floating_content" class="stsc-floating-content"></div>
    <div class="stsc-floating-footer">
      <button id="stsc_floating_open_manager" class="menu_button" type="button">打开完整管理器</button>
    </div>
  </div>
</div>
